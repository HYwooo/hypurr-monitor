# ============================================================
# hypurr-monitor 配置文件示例
# 复制此文件为 config.toml 后修改使用
# ============================================================

# ------------------------------------------------------------
# Webhook 配置 - 飞书机器人通知
# ------------------------------------------------------------
[webhook]
url = "https://open.feishu.cn/open-apis/bot/v2/hook/your-webhook-here"
format = "card"  # 消息格式: card (卡片) 或 text (文本)

# ------------------------------------------------------------
# 交易对配置
# ------------------------------------------------------------
[symbols]
# Hyperliquid symbols:
#   Main perpetuals: BTC, ETH, SOL
#   HIP-3 perpetuals: xyz:GOLD, hyna:BTC, flx:TSLA, vntl:SPACEX, km:US500, cash:USA500
#   Spot: spot:HYPE/USDC, spot:BTC/USDC
single_list = ["BTC", "ETH", "SOL", "HYPE", "ZEC", "MON"]
pair_list = [
    # "BTC-ETH",        # BTC-ETH 价差交易对
    # "BTC-xyz:GOLD",   # BTC 与 GOLD 的价差交易对
    # "ETH-SOL",        # ETH-SOL 价差交易对
]

# 策略配置
# 可用策略: "atr_channel" (ATR Channel Breakout), "clustering_st" (Clustering SuperTrend)
# 单标的和配对交易可以使用不同策略，灵活配置
single_strategy = "atr_channel"  # 单标的默认策略
pair_strategy = "clustering_st"  # 配对交易默认策略

# ------------------------------------------------------------
# ATR Channel 指标配置 (1小时周期)
# 用于: 趋势判断、止损通道
# ------------------------------------------------------------
[atr_1h]
ma_type = "DEMA"  # 均线类型: DEMA, EMA, SMA, WMA, HMA, TEMA
period = 14  # ATR 计算周期
mult = 1.618  # ATR 倍数 (通道宽度)

# ------------------------------------------------------------
# ATR Channel 指标配置 (15分钟周期)
# 用于: 短期趋势确认
# ------------------------------------------------------------
[atr_15m]
ma_type = "HMA"  # 15m 使用 HMA 更灵敏
period = 14
mult = 1.382  # 略小于 1h 的倍数

# ------------------------------------------------------------
# Clustering SuperTrend 聚类超级趋势配置
# 备选指标，当 enabled = true 时启用
# ------------------------------------------------------------
[clustering_st]
enabled = false  # 是否启用聚类超级趋势
min_mult = 1.0  # ATR 倍数范围下限
max_mult = 5.0  # ATR 倍数范围上限
step = 0.5  # 步进值
perf_alpha = 10.0  # 性能指数平滑系数
from_cluster = "Best"  # 从哪个聚类开始: Best, Next, Prev
max_iter = 1000  # K-Means 最大迭代次数
history_klines = 500  # 历史 K 线数量

# ------------------------------------------------------------
# 服务配置
# ------------------------------------------------------------
[service]
heartbeat_file = "heartbeat"  # 心跳文件路径
heartbeat_timeout = 120  # 心跳超时时间 (秒)

# ------------------------------------------------------------
# 代理配置
# 支持 HTTP/HTTPS 代理
# ------------------------------------------------------------
[proxy]
enable = false # 是否启用代理
url = "http://127.0.0.1:7890"  # 代理地址

# ------------------------------------------------------------
# 定时报告配置 (备选功能)
# ------------------------------------------------------------
[report]
enable = false  # 是否启用定时报告
times = ["08:00", "20:00"]  # 报告时间

# ------------------------------------------------------------
# 全局设置
# ------------------------------------------------------------
[settings]
timezone = "+08:00"  # 时区: Z (UTC) 或 +08:00 / -05:00 格式
max_log_lines = 1000  # 日志最大行数
disable_single_trailing = false  # 禁用单标的追踪止损
disable_pair_trailing = false  # 禁用配对追踪止损
exchange = "hyperliquid"  # 交易所: hyperliquid

# ============================================================
# ML 信号系统配置 (CatBoost + LSTM)
# ============================================================

# ------------------------------------------------------------
# ML 数据配置
# ------------------------------------------------------------
[ml]
enable = false  # 是否启用 ML 信号
timeframe = "15m"  # K 线周期
lookback_days = 730  # 历史数据回溯天数 (2年)
model_path = "models/ml/"  # 预训练模型目录

# ------------------------------------------------------------
# ML 标注配置
# ------------------------------------------------------------
[ml.labeling]
neutral_scale = 0.5  # 平的定义: |return| <= ATR * neutral_scale
lookforward_bars = 1  # 向前看几根 K 线

# ------------------------------------------------------------
# ML 模型配置
# ------------------------------------------------------------
[ml.model]
primary = "catboost"  # 主模型: catboost, lightgbm, xgboost
use_lstm_residual = true  # 是否使用 LSTM 残差修正

[ml.model.catboost]
task_type = "GPU"  # GPU 或 CPU
devices = "0"  # GPU 设备
iterations = 2000  # 迭代次数
learning_rate = 0.03  # 学习率
depth = 6  # 树深度
l2_leaf_reg = 3  # L2 正则化

[ml.model.lightgbm]
device = "gpu"  # gpu 或 cpu
num_iterations = 2000
learning_rate = 0.03
max_depth = 6

[ml.model.xgboost]
device = "cuda"  # cuda 或 cpu
n_estimators = 2000
learning_rate = 0.03
max_depth = 6

[ml.model.lstm]
seq_len = 10  # 序列长度
hidden_size = 64  # LSTM 隐藏层大小
epochs = 50  # 训练轮数
batch_size = 32  # 批次大小

# ------------------------------------------------------------
# ML 训练配置
# ------------------------------------------------------------
[ml.training]
train_ratio = 0.7  # 训练集比例
valid_ratio = 0.15  # 验证集比例
test_ratio = 0.15  # 测试集比例
class_weights = [1.0, 0.5, 1.0]  # 各类别权重 (down, neutral, up)

# ------------------------------------------------------------
# ML 回测配置
# ------------------------------------------------------------
[ml.backtest]
initial_capital = 10000.0  # 初始资金
fee_taker = 0.0005  # Taker 手续费: 0.05%
fee_maker = 0.0002  # Maker 手续费: 0.02%
funding_annual = 0.1095  # 资金费率年化: 10.95%

# ------------------------------------------------------------
# ML 配对配置
# ------------------------------------------------------------
[ml.pairs]
# 配对列表，与上面的 [symbols] pair_list 联动
# 格式: ["BTC-ETH", "BTC-SOL", "ETH-SOL", "xyz:GOLD-xyz:SILVER"]
list = ["BTC-ETH", "BTC-SOL", "ETH-SOL"]
